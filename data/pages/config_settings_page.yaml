# 备注：
# 1. 配置设定模块包含以下子功能：
#    - 货位密度修改 (frmUpdateStationDensityConfig)
#    - 储罐密度修改 (frmUpdateTankStationDensityConfig)
#    - 设置流量计类型 (frmSetFlowmeterType)
#    - 密度历史记录 (frmConfigMDHistory)
#    - 下发到装车仪器 (btnSet -> CustomMessageBox弹窗)
# 2. frmConfig：配置设定主页面，包含筛选条件和DataGridView
# 3. DataGridView显示的列：货位号、货位名称、油品名称、计重密度、组分计密、乙醇计密、组分标密、乙醇标密、乙醇比例、密度是否下发、组分油品、乙醇品名、组分罐、乙醇罐、是否调和、发油方式规则、组分流量计类型、乙醇流量计类型、组分密度下发时间、乙醇密度下发时间、业务系统审核时间、下载时间、是否启用仓位、是否启用钥匙管理器
# 4. 储罐密度修改窗口有一个flowLayoutPanel用于勾选需同步修改的货位，以及一个dataGridView显示当前配置的储罐密度
# 5. 货位密度修改窗口中的VCF(textBox1)是只读字段，由计算按钮触发计算
# 6. 密度历史记录窗口DataGridView列：油品名称、混合计重密度、组分计密、乙醇计密、组分标密、乙醇标密、影响货位、写入时间、数据来源
# 7. 下发到装车仪器功能使用CustomMessageBox弹窗进行操作提示和结果反馈


# ========================================
# test_data - 测试数据模板（AI自动生成）
# 使用方法：在 conftest.py 的 page_test_factory fixture 中使用
# ========================================
test_data:
  # ==================== 刷新配置数据测试 ====================
  # 刷新配置数据成功场景
  refresh_config_success:
    _description: "刷新配置设定数据成功"
    _method: "refresh_config_data"
    timeout: 10.0

  # 按货位筛选刷新配置数据
  refresh_with_station_filter:
    _description: "按货位筛选刷新配置数据"
    _method: "refresh_config_data"
    station_filter: "货位1"
    timeout: 10.0

  # 按油品筛选刷新配置数据
  refresh_with_oil_filter:
    _description: "按油品筛选刷新配置数据"
    _method: "refresh_config_data"
    oil_filter: "汽油"
    timeout: 10.0

  # 按货位和油品筛选刷新配置数据
  refresh_with_both_filter:
    _description: "按货位和油品筛选刷新配置数据"
    _method: "refresh_config_data"
    station_filter: "货位1"
    oil_filter: "汽油"
    timeout: 10.0

  # ==================== 设置流量计类型测试 ====================
  # 设置流量计类型成功场景
  set_flowmeter_success:
    _description: "设置流量计类型成功"
    _method: "set_flowmeter_type_and_verify"
    search_key: "01"
    flowmeter_type1: "质量流量计"
    flowmeter_type2: "体积流量计"
    confirm: true
    timeout: 10.0

  # 设置流量计类型（仅组分）
  set_flowmeter_only_type1:
    _description: "设置流量计类型（仅组分）"
    _method: "set_flowmeter_type_and_verify"
    search_key: "01"
    flowmeter_type1: "质量流量计"
    confirm: true
    timeout: 10.0

  # 设置流量计类型取消场景
  set_flowmeter_cancel:
    _description: "设置流量计类型取消"
    _method: "set_flowmeter_type_and_verify"
    search_key: "01"
    flowmeter_type1: "质量流量计"
    confirm: false
    timeout: 10.0

  # ==================== 货位密度修改测试 ====================
  # 修改货位密度成功场景
  update_station_density_success:
    _description: "修改货位密度成功"
    _method: "update_station_density_and_verify"
    search_key: "01"
    weight_density: "0.8500"
    standard_density1: "0.8200"
    standard_density2: "0.7900"
    confirm: true
    timeout: 10.0

  # 修改货位密度（带计算）
  update_station_density_with_compute:
    _description: "修改货位密度并触发计算"
    _method: "update_station_density_and_verify"
    search_key: "01"
    standard_density1: "0.8200"
    standard_density2: "0.7900"
    weight_density1: "0.8300"
    weight_density2: "0.8000"
    compute: true
    confirm: true
    timeout: 10.0

  # 修改货位密度取消场景
  update_station_density_cancel:
    _description: "修改货位密度取消"
    _method: "update_station_density_and_verify"
    search_key: "01"
    weight_density: "0.8500"
    confirm: false
    timeout: 10.0

  # 修改货位密度（完整参数）
  update_station_density_full:
    _description: "修改货位密度（完整参数）"
    _method: "update_station_density_and_verify"
    search_key: "01"
    oil_name: "汽油"
    tank_name1: "组分罐1"
    tank_name2: "乙醇罐1"
    weight_density: "0.8500"
    standard_density1: "0.8200"
    standard_density2: "0.7900"
    weight_density1: "0.8300"
    weight_density2: "0.8000"
    confirm: true
    timeout: 10.0

  # ==================== 储罐密度修改测试 ====================
  # 修改储罐密度成功场景
  update_tank_density_success:
    _description: "修改储罐密度成功"
    _method: "update_tank_density_and_verify"
    oil_name: "汽油"
    tank_name1: "组分罐1"
    tank_name2: "乙醇罐1"
    weight_density: "0.8500"
    standard_density1: "0.8200"
    standard_density2: "0.7900"
    confirm: true
    timeout: 10.0

  # 修改储罐密度（仅组分）
  update_tank_density_type1_only:
    _description: "修改储罐密度（仅组分）"
    _method: "update_tank_density_and_verify"
    oil_name: "汽油"
    tank_name1: "组分罐1"
    weight_density: "0.8500"
    standard_density1: "0.8200"
    confirm: true
    timeout: 10.0

  # 修改储罐密度取消场景
  update_tank_density_cancel:
    _description: "修改储罐密度取消"
    _method: "update_tank_density_and_verify"
    oil_name: "汽油"
    tank_name1: "组分罐1"
    weight_density: "0.8500"
    confirm: false
    timeout: 10.0

  # 修改储罐密度（带发油类型）
  update_tank_density_with_oil_type:
    _description: "修改储罐密度并设置发油类型"
    _method: "update_tank_density_and_verify"
    oil_name: "汽油"
    tank_name1: "组分罐1"
    tank_name2: "乙醇罐1"
    weight_density: "0.8500"
    standard_density1: "0.8200"
    standard_density2: "0.7900"
    out_oil_type: "正常发油"
    confirm: true
    timeout: 10.0

  # ==================== 密度历史记录查询测试 ====================
  # 查询密度历史记录
  query_md_history:
    _description: "查询密度历史记录"
    _method: "query_md_history"
    timeout: 10.0

  # 按油品查询密度历史记录
  query_md_history_by_oil:
    _description: "按油品查询密度历史记录"
    _method: "query_md_history"
    oil_name: "汽油"
    timeout: 10.0

  # 按时间范围查询密度历史记录
  query_md_history_by_time:
    _description: "按时间范围查询密度历史记录"
    _method: "query_md_history"
    start_time: "2026-01-01"
    end_time: "2026-04-10"
    timeout: 10.0

  # 按油品和时间范围查询密度历史记录
  query_md_history_by_oil_and_time:
    _description: "按油品和时间范围查询密度历史记录"
    _method: "query_md_history"
    oil_name: "汽油"
    start_time: "2026-01-01"
    end_time: "2026-04-10"
    timeout: 10.0

  # ==================== 下发到装车仪器测试 ====================
  # 下发到装车仪器
  send_to_device:
    _description: "下发配置到装车仪器"
    _method: "send_to_device"
    timeout: 10.0

  # 下发到装车仪器（预期成功）
  send_to_device_expect_success:
    _description: "下发配置到装车仪器（预期成功）"
    _method: "send_to_device"
    expect_contains: "成功"
    timeout: 10.0

  # 下发到装车仪器（预期提示）
  send_to_device_expect_warning:
    _description: "下发配置到装车仪器（预期有提示信息）"
    _method: "send_to_device"
    expect_contains: "请先关闭"
    timeout: 10.0
