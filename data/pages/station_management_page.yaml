        type: "Button"
      close_button:
        automation_id: "button1"
        name: "关闭"
        type: "Button"

  # ========== 修改货位窗口 ==========
  alter_station_window:
    automation_id: "frmStationAddOrUpdate"
    name: "修改货位信息"
    type: "Window"
    child_elements:
      station_id_edit:
        automation_id: "textstationNoId"
