# 货位信息管理配置文件
# 货位信息管理窗口配置
app_config:
  # 不同页面的main_window_name都是对应页面的窗体name
  main_window_name: "货位信息管理"
  head_keys: ["货位号", "货位名称", "作业位编号", "阻车器AI启用状态", "仓位识别AI启用状态", "通讯协议版本号", "所属串口", "是否启用", "实发量计算方式", "标密设定方式", "指定货位号", "乙醇标密指定方式", "乙醇指定货位号"]


# 货位信息管理页面元素定位
elements:
  # ========== 货位信息管理主页面(frmStationManage) ==========
  station_manage_page:
    automation_id: "frmStationManage"
    name: "货位信息管理"
    type: "Window"
    child_elements:
      add_station_button:
        automation_id: "btnAddStation"
        name: "添加货位"
        type: "Button"
      alter_station_button:
        automation_id: "btnUpdateStation"
        name: "修改货位"
        type: "Button"
      delete_station_button:
        automation_id: "btnDeleteStation"
        name: "删除货位"
        type: "Button"
      alter_base_param_button:
        automation_id: "button1"
        name: "修改基础参数"
        type: "Button"
      content_table:
        automation_id: "dataGridView"
        name: "DataGridView"
        type: "Table"

  # ========== 添加货位窗口 ==========
  add_station_window:
    automation_id: "frmStationAddOrUpdate"
    name: "添加货位信息"
    type: "Window"
