# 装车开票管理配置文件
# 装车开票管理窗口配置
app_config:
  #不同页面的main_window_name都是对应页面的窗体name
  main_window_name: "装车开票"
  head_keys : ["客户全称","提货单号","车牌号码","油品名称","发油货位","预装体积","预装重量","提单状态","开票时间"]

# 装车开票页面元素定位
elements:
  # ==================== 主窗体按钮 ====================
  add_invoice_button:
    automation_id: "btnAddInfo"
    name: "添加开票信息"
  update_invoice_button:
    automation_id: "btnUpdateInfo"
    name: "修改开票信息"
  delete_invoice_button:
    automation_id: "btnDelete"
    name: "删除开票信息"
  update_state_button:
    automation_id: "btnUpdateState"
    name: "修改提单状态"
  split_bill_button:
    automation_id: "btnSplitBill"
    name: "分单"
  exception_button:
    automation_id: "btnException"
    name: "异常处理"
  audit_button:
    automation_id: "btnAudit"
    name: "审核"
  print_button:
    automation_id: "btnPrint"
    name: "打印交接单"
  update_station_button:
    automation_id: "btnUpdateStation"
    name: "修改提单货位"

  # 窗口控制按钮
  minimize_button:
    automation_id: "min"
    name: "最小化"
  close_button:
    automation_id: "close"
    name: "关闭"

  # 查询条件区域
  content_table:
    automation_id: "dataGridView"
    name: "DataGridView"
    type: "Table"
  query_panel:
    name: "panel1"
    type: "Panel"

  # 查询条件 TextBox 控件
  bill_num_query_text:
    automation_id: "txtBillNumQuery"
    name: "提货单号"
  vehicle_no_query_text:
    automation_id: "txtVehicleNo"
    name: "车牌号码"
  buyer_name_query_text:
    automation_id: "txtBuyerName"
    name: "客户名称"

  # 查询条件 ComboBox 控件
