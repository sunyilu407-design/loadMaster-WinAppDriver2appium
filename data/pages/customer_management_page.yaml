    timeout: 10.0

  # 修改客户成功场景
  alter_customer_success:
    _description: "修改客户成功"
    _method: "alter_customer_and_verify"
    search_key: "原始客户"
    new_short_name: "修改后客户简称"
    new_full_name: "修改后客户名称"
