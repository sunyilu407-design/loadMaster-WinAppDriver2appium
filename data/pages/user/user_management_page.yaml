# 用户信息管理配置文件
# 用户信息管理窗口配置
app_config:
  #不同页面的main_window_name都是对应页面的窗体name
  main_window_name: "用户信息管理"
  head_keys : ["用户姓名","用户类型","注册时间","备注"]


# 用户信息管理页面元素定位
elements:
  # 用户信息管理页面特征元素 - 可以根据实际应用情况添加具体元素
  add_user_button: #添加用户按钮
    automation_id: "btnAddUser"
    name: "添加用户"
#    type: "Button"
  alter_user_button: #修改用户按钮
    automation_id: "btnUpdateUser"
#    type: "Button"
  delete_user_button: #删除用户按钮
    automation_id: "btnDeleteUser"
#    type: "Button"
  set_permission_button: #设置权限按钮
    automation_id: "btnSetUserModule"
#    type: "Button"
  reset_password_button: #重置密码按钮
    automation_id: "btnResetPwd"
#    type: "Button"
  content_table:  # 用户信息管理页面内容表格
    automation_id: "dataGridView"
    name: "DataGridView"
    type: "Table"
  add_user_window:
    #添加用户信息窗口
    automation_id: "frmUserAddOrUpdate"
    name: "添加用户信息"
    type: "Window"
    child_elements:
      user_name_edit:
        automation_id: "txtUserName"
#        type: "Edit"
      user_type_combo:
        automation_id: "cboUserType"
#        type: "ComboBox"
      remark_edit:
        automation_id: "txtRemark"
#        type: "Edit"
      affiliated_system_tree:
        automation_id: "tvwSystem"
#        type: "Tree"
      add_button:
        automation_id: "btnAddUser"
#        type: "Button"
      cancel_button:
        automation_id: "btnCancel"
#        type: "Button"
      quit_button:
        automation_id: "button1"
#        type: "Button"
  alter_user_window:
    automation_id: "frmUserAddOrUpdate"
    name: "修改用户信息"
    #type: "Window"
    child_elements:
        user_name_edit:
          automation_id: "txtUserName"
          #type: "Edit"
        user_type_combo:
          automation_id: "cboUserType"
          #type: "ComboBox"
        remark_edit:
          automation_id: "txtRemark"
          #type: "Edit"
        affiliated_system_tree:
          automation_id: "tvwSystem"
          #type: "Tree"
        alter_button:
          automation_id: "btnAddUser"
          #type: "Button"
        cancel_button:
          automation_id: "btnCancel"
          #type: "Button"
        quit_button:
          automation_id: "button1"
          #type: "Button"
  delete_user_window:
      automation_id: "CustomMessageCheckBox"
      name: "CustomMessageCheckBox"
      type: "Window"
      child_elements:
        confirm_button:
          automation_id: "btnMsg1"
          type: "Button"
        cancel_button:
          automation_id: "btnMsg2"
          type: "Button"
        quit_button:
          automation_id: "msgBtn"
          type: "Button"
        prompt_text:
          automation_id: "msgLabel2"
          type: "Text"
  set_permission_window:
    automation_id: "frmUserModule"
    name: "设置权限"
    #type: "Window"
    child_elements:
      user_name_Edit:
        automation_id: "txtUserName"
        #type: "Edit"
      permission_tree:
        automation_id: "tvwModule"
        #type: "Tree"
      save_button:
        automation_id: "btnAddUserModule"
        #type: "Button"
      cancel_button:
        automation_id: "btnCancel"
        #type: "Button"
      quit_button:
        automation_id: "button1"
        #type: "Button"
   # 重置密码确认窗口
  reset_password_window:
    automation_id: "CustomMessageCheckBox"
    name: "CustomMessageCheckBox"
    #type: "Window"
    description: "重置密码确认弹窗"
    child_elements:
      confirm_button:
        automation_id: "btnMsg1"
        #type: "Button"
        name: "是"
        description: "确认重置按钮"
      cancel_button:
        automation_id: "btnMsg2"
        #type: "Button"
        name: "否"
        description: "取消重置按钮"
      prompt_text:
        automation_id: "msgLabel2"
        #type: "Text"
        description: "重置提示文本"
      quit_button:
        automation_id: "msgBtn"
        #type: "Button"
        name: "退出"
        description: "退出按钮"
  
  
  prompt_window: #所有模块公用的提示窗口，是，文本
    automation_id: "CustomMessageBox"
    name: "消息提示"
    #type: "Window"
    child_elements:
      confirm_button:
        automation_id: "btnMsg"
        #type: "Button"
      prompt_text:
        automation_id: "msgLabel2"
        #type: "Text"
  operation_window: #操作提示窗口,是，否，文本
    automation_id: "CustomMessageCheckBox"
    name: "CustomMessageCheckBox"
    #type: "Window"
    child_elements:
      confirm_button:
        automation_id: "btnMsg1"
        #type: "Button"
      cancel_button:
        automation_id: "btnMsg2"
        #type: "Button"
      prompt_text:
        automation_id: "msgLabel2"
        #type: "Text"
      quit_button:
        automation_id: "msgBtn"
        #type: "Button"

# 用户信息管理页面数据驱动测试数据
test_data:
  # ========== 添加用户测试数据 ==========
  add_user_scenario:
    _description: "添加用户并验证"
    _method: "add_user_and_verify"
    username: "test1"
    usertype: "操作员"
    remark: "测试添加用户"
    affiliated_system: ["发油系统", "排队系统", "门禁系统", "安规录入系统"]
    confirm_prompt: true
    timeout: 5.0

  # ========== 修改用户测试数据 ==========
  alter_user_scenario_1:
    _description: "修改用户类型和备注并验证"
    _method: "alter_user_and_verify"
    old_username: "test1"
    new_username: null  # 不修改用户名
    new_usertype: "操作员"
    new_remark: "修改后的备注信息"
    new_affiliated_system: null  # 不修改所属系统
    confirm: true
    timeout: 5.0

  alter_user_scenario_2:
    _description: "修改用户名并验证"
    _method: "alter_user_and_verify"
    old_username: "test1"
    new_username: "test1_modified"
    new_usertype: null  # 不修改用户类型
    new_remark: null  # 不修改备注
    new_affiliated_system: null  # 不修改所属系统
    confirm: true
    timeout: 5.0

  alter_user_scenario_3:
    _description: "修改所属系统并验证"
    _method: "alter_user_and_verify"
    old_username: "test1"
    new_username: null
    new_usertype: null
    new_remark: null
    new_affiliated_system: ["发油系统", "门禁系统"]  # 只选择部分系统
    confirm: true
    timeout: 5.0

  alter_user_scenario_cancel:
    _description: "修改用户但取消操作"
    _method: "alter_user_and_verify"
    old_username: "test1"
    new_username: "test_cancel"
    new_usertype: "司衡员"
    new_remark: "取消修改的备注"
    new_affiliated_system: ["发油系统"]
    confirm: false  # 取消操作
    timeout: 5.0

  # ========== 设置权限测试数据 ==========
  set_permission_scenario_1:
    _description: "设置用户权限并验证"
    _method: "set_permission_and_verify"
    username: "test1"
    permissions: ["用户信息", "添加用户", "修改用户", "删除用户"]
    confirm: true
    timeout: 5.0

  set_permission_scenario_2:
    _description: "设置更多权限节点"
    _method: "set_permission_and_verify"
    username: "test1"
    permissions: ["用户信息", "添加用户", "修改用户", "删除用户", "设置权限", "重置密码", "基础设置"]
    confirm: true
    timeout: 5.0

  # ========== 重置密码测试数据 ==========
  reset_password_scenario_confirm:
    _description: "重置用户密码并确认"
    _method: "reset_password_and_verify"
    username: "test1"
    confirm: true
    timeout: 5.0

  reset_password_scenario_cancel:
    _description: "重置用户密码但取消"
    _method: "reset_password_and_verify"
    username: "test1"
    confirm: false
    timeout: 5.0

  # ========== 删除用户测试数据 ==========
  delete_user_scenario:
    _description: "删除用户并验证"
    _method: "delete_user_and_verify"
    username: "test1"
    confirm: true
    timeout: 5.0