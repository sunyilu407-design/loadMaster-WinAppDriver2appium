# ============================================
# 通用自动化测试环境配置 - Appium版本
# ============================================

[default]
# 默认配置

[windows_app]
# Windows应用配置 - Appium 2.x + Windows Driver
# 注意: 请根据你的实际安装路径修改下面的配置

# 应用可执行文件路径 (如果不需要自动启动应用，可以留空)
# location = C:\\Path\\To\\Your\\Application.exe
location =D:\loadMaster_LD\LoadMaster.exe

# 应用主窗口标题 (用于Appium连接已运行的应用)
# 使用任务管理器或工具查看应用窗口的标题
app_name = 欢迎使用微分科技装车管理系统

# ============================================
# Appium 2.x 服务配置
# ============================================
# Appium服务器地址
appium_host = 127.0.0.1
# Appium服务器端口 (默认4723)
appium_port = 4723
# Appium超时设置
appium_session_timeout = 60  # Session超时时间（秒）
appium_command_timeout = 60  # 命令执行超时（秒）

# ============================================
# 性能优化配置 (新增)
# ============================================
# 元素缓存配置
element_cache_enabled = True
element_cache_timeout = 300  # 元素缓存超时（秒），0=禁用缓存

# 智能等待配置
smart_wait_enabled = True
smart_wait_poll_interval = 0.3  # 轮询间隔（秒）
smart_wait_timeout = 10  # 智能等待超时（秒）

# 隐式等待配置
implicit_wait = 2  # 隐式等待时间（秒），配合缓存使用

# ============================================
# 原有WinAppDriver配置（保留兼容）
# ============================================
winappdriver_host = 127.0.0.1
winappdriver_port = 4723

# 应用启动超时时间（秒）
app_startup_timeout = 30
# 元素查找超时时间（秒）
element_timeout = 10
# 页面加载等待时间（秒）
page_load_timeout = 15

[web]
# Web测试配置
browser = chrome
headless = False
base_url =
# WebDriver配置
webdriver_timeout = 10
webdriver_implicit_wait = 5

[database]
# 数据库配置
db_type = mysql
host = localhost
port = 3306
username = root
password =
database = test
# 数据库连接超时（秒）
db_timeout = 30

[allure]
# Allure报告配置
report_url =
info_url =
# 报告生成目录
report_dir = ./reports
# 截图保存目录
screenshot_dir = ./screenshots

[logging]
# 日志配置
log_level = INFO
log_file = ./logs/automation.log
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
# 日志文件最大大小（MB）
max_log_size = 10
# 日志文件备份数量
backup_count = 5

[retry]
# 重试配置
max_retries = 0
retry_delay = 0

[performance]
# 性能测试配置
response_time_threshold = 30
memory_threshold = 80
cpu_threshold = 90

[parallel]
# 并行测试配置
enabled = True
max_workers = 3  # 最大并行工作线程数
